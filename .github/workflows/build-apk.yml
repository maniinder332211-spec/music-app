name: Build APK

on:
  push:
    branches:
      - main

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true  # Node.js 24 support

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repo
      uses: actions/checkout@v3

    - name: Setup JDK 17
      uses: actions/setup-java@v3
      with:
        distribution: temurin
        java-version: 17

    - name: Install required packages
      run: |
        sudo apt-get update
        sudo apt-get install -y wget unzip tar

    - name: Download Android Command-line Tools
      run: |
        wget https://dl.google.com/android/repository/commandlinetools-linux-9477386_latest.zip -O cmdline-tools.zip
        mkdir -p $HOME/Android/cmdline-tools
        unzip cmdline-tools.zip -d $HOME/Android/cmdline-tools

    - name: Accept licenses & install SDK
      run: |
        yes | $HOME/Android/cmdline-tools/cmdline-tools/bin/sdkmanager --licenses
        $HOME/Android/cmdline-tools/cmdline-tools/bin/sdkmanager "platform-tools" "platforms;android-34" "build-tools;34.0.0"

    - name: Set Android SDK path
      run: |
        echo "ANDROID_HOME=$HOME/Android" >> $GITHUB_ENV
        echo "$HOME/Android/platform-tools" >> $GITHUB_PATH
        echo "$HOME/Android/cmdline-tools/cmdline-tools/bin" >> $GITHUB_PATH

    - name: Make Gradle executable
      run: chmod +x ./gradlew

    - name: Build APK
      run: ./gradlew assembleDebug --stacktrace --refresh-dependencies

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: app-debug-apk
        path: app/build/outputs/apk/debug/app-debug.apk
